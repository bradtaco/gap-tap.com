# _data/ui-text.yml for Agency Jekyll Theme
#
# Updated for minimal Gap Tap site with sections:
#   1. overview
#   2. specs
#   3. compare
#   4. how-to-use
#   5. buy
#
# Usage:
#   In _config.yml, set `locale: "en"` or "en-US" so the theme loads from this file.

en: &DEFAULT_EN
  header:
    title: "Welcome to Gap Tap!"
    text: "Flawless Floors. Seamless Repairs."
    button: "Learn More"
    buttonlink: "#overview"

  # 1. Overview
  overview:
    title: "Overview"
    text: "Gap Tap is the quick, reliable way to fix gaps in laminate, vinyl, or wood floors. Save time, save money, and enjoy perfectly aligned floors."
    section: overview
    list:
      - title: "Heavy-Duty Suction Cup"
        desc: "Securely grips floor planks, letting you close gaps efficiently without damage."
        icon: fas fa-anchor
      - title: "Non-Scratch Mallet"
        desc: "Designed for gentle yet firm tapping, ensuring smooth repairs without floor scratches."
        icon: fas fa-hammer
      - title: "Built to Last"
        desc: "Crafted with premium materials to handle repeated use, perfect for DIYers and professionals alike."
        icon: fas fa-tools

  # 2. Specs
  specs:
    title: "Specs"
    text: "Dive into the technical details of Gap Tap."
    section: specs
    bulletpoints:
      - "Weight: ~3.2 lbs (1.45 kg)"
      - "Suction Diameter: 4.5 in (approx. 11.4 cm)"
      - "Mallet Material: Non-scratch rubber head"
      - "Body Materials: PA, steel, shock-absorbing rubber"

  # 3. Compare
  compare:
    title: "Compare"
    text: "How does Gap Tap stack up against other floor repair methods?"
    section: compare
    events:
      - title: "Block + Hammer"
        year: ""
        desc: "Risky if you slip, plus potential floor damage. Often less precise."
        image: assets/img/compare/block.jpg
        alt: "Block and hammer"
      - title: "Generic Suction Tools"
        year: ""
        desc: "Weak grip, not designed for repeated mallet strikes, leading to poor results."
        image: assets/img/compare/generic.jpg
        alt: "Generic suction tool"
      - title: "Gap Tap Advantage"
        year: ""
        desc: "Powerful suction, sturdy non-scratch mallet, premium build. Specifically made to fix floor gaps effortlessly."
        image: assets/img/compare/gap-tap.jpg
        alt: "Gap Tap tool"
    end: "Choose the Better Way!"

  # 4. How to Use
  how-to-use:
    title: "How to Use"
    text: "Close gaps in just a few simple steps."
    section: how-to-use
    body: "1. Clean the gap area.<br>2. Position the suction cup firmly on the floor plank.<br>3. Gently tap with the non-scratch mallet until the gap is closed.<br><br>**Tip:** Check out our included instruction sheet for more details."

  # 5. Buy
  buy:
    title: "Buy Gap Tap"
    text: "Ready to get flawless floors? Pick a store below:"
    section: buy
    storelinks:
      - name: "Amazon"
        url: "https://www.amazon.com/dp/B0DJHFJ8PC"
        icon: fab fa-amazon
      - name: "Walmart"
        url: "https://www.walmart.com/ip/Gap-Tap-Heavy-Duty-Floor-Fixing-Tool/15297350480"
        icon: fas fa-store
      - name: "eBay"
        url: "https://www.ebay.com/itm/297015894001"
        icon: fab fa-ebay
    note: "Questions or bulk orders? Email <strong>support@gap-tap.com</strong>."

  # Footer
  footer:
    legal: "Privacy Policy"
    social:
      - url: https://twitter.com
        icon: "fab fa-twitter"
      - url: https://facebook.com
        icon: "fab fa-facebook-f"
      - url: https://linkedin.com
        icon: "fab fa-linkedin-in"
      - url: https://github.com/raviriley/agency-jekyll-theme
        icon: "fab fa-github"
      - url: https://instagram.com
        icon: "fab fa-instagram"

en-US:
  <<: *DEFAULT_EN
en-CA:
  <<: *DEFAULT_EN
en-GB:
  <<: *DEFAULT_EN
en-AU:
  <<: *DEFAULT_EN

