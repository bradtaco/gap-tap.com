# _data/ui-text.yml for Agency Jekyll Theme
#
# Updated to reflect "Gap Tap" brand and product.
# Usage:
#   In your _config.yml, set `locale: "en"` (or en-US) to load this data.
#
# References:
#   https://github.com/raviriley/agency-jekyll-theme
#   Each section references these text variables.

en: &DEFAULT_EN
  header:
    title: "Welcome to Gap Tap!"
    text: "Flawless Floors. Seamless Repairs."
    button: "Discover More"
    buttonlink: "#services"

  services:
    title: "Key Features"
    text: "Gap Tap quickly fixes gaps in laminate, vinyl, or wood floors."
    section: services
    list:
      - title: "Heavy-Duty Suction Cup"
        desc: "Securely grips floor pieces for seamless gap closure without damage."
        icon: fas fa-hand-rock
      - title: "Non-Scratch Mallet"
        desc: "Includes a specially designed mallet to gently close gaps without harming your floors."
        icon: fas fa-hammer
      - title: "Durable & User-Friendly"
        desc: "Built with premium materials to ensure reliability and ease of use. Perfect for DIYers and professionals alike."
        icon: fas fa-tools

  portfolio:
    title: "Product Gallery"
    text: "Take a closer look at Gap Tap in action."
    section: portfolio
    closebutton: "Close"

  timeline:
    title: "Our Journey"
    text: "How Gap Tap Came to Be"
    section: timeline
    # left is the default
    #start_align: "left"
    events:
      - title: "Identifying the Problem"
        year: "2023"
        desc: "Realizing the hassle of floor gaps, we set out to create a tool that any homeowner or contractor could use with ease."
        image: assets/img/timeline/1.jpg
        alt: "Identifying the Problem"
      - title: "Prototyping & Testing"
        year: "2024"
        desc: "Countless design iterations led to a robust suction system and mallet combination that delivers professional results."
        image: assets/img/timeline/2.jpg
        alt: "Prototyping and Testing"
      - title: "Gap Tap Goes Live"
        year: "2025"
        desc: "We introduced Gap Tap to the market, offering a cost-effective, reliable solution for laminate, vinyl, and hardwood floors."
        image: assets/img/timeline/3.jpg
        alt: "Gap Tap Launch"
      - title: "Continued Innovation"
        year: "Present"
        desc: "We remain committed to improving home repair tools and helping users maintain beautiful floors."
        image: assets/img/timeline/4.jpg
        alt: "Continued Innovation"
    end: "Be Part <br> of Our <br> Story!"

  about:
    title: "About Us"
    text: "Our Story"
    body: "Gap Tap is a product of Circle Solutions LLC. We’re dedicated to simplifying home repairs and empowering homeowners with reliable, easy-to-use tools. **Markdown** is supported in this text for formatting."
    section: about

  clients:
    section: clients
    max-height: 100px
    horizontal-scrolling: "" # "yes" or "no"
    list:
      - title: "Home Repair Enthusiasts"
        url: "#"
        logo: assets/img/clients/envato.jpg
      - title: "Flooring Professionals"
        url: "#"
        logo: assets/img/clients/designmodo.jpg
      - title: "DIY Community"
        url: "#"
        logo: assets/img/clients/themeforest.jpg
      - title: "Contractor Associations"
        url: "#"
        logo: assets/img/clients/creative-market.jpg

  team:
    title: "Meet Our Team"
    text: "Passionate about flawless floors."
    subtext: "We combine design, engineering, and real-world testing to ensure Gap Tap meets the highest standards."
    section: team
    people:
      - name: "Brad Dougherty"
        role: "Founder & Design Lead"
        image: assets/img/team/500x500.jpg
        social:
          - url: https://twitter.com
            icon: fab fa-twitter
          - url: https://facebook.com
            icon: fab fa-facebook-f
          - url: https://linkedin.com
            icon: fab fa-linkedin-in
      - name: "Soo Smith"
        role: "Operations Manager"
        image: assets/img/team/2.jpg
        social:
          - url: https://twitter.com
            icon: fab fa-twitter
          - url: https://facebook.com
            icon: fab fa-facebook-f
          - url: https://linkedin.com
            icon: fab fa-linkedin-in
      - name: "Nick Lu"
        role: "Manufacturing Partner"
        image: assets/img/team/500x500.jpg
        social:
          - url: https://twitter.com
            icon: fab fa-twitter
          - url: https://facebook.com
            icon: fab fa-facebook-f
          - url: https://linkedin.com
            icon: fab fa-linkedin-in

  contact:
    title: "Contact Us"
    text: "Reach out with any questions or support needs."
    section: contact
    name: "Name*"
    name-validation: "Please enter your name."
    email: "Email*"
    email-validation: "Please enter your email address."
    phone: "Phone Number"
    phone-validation: "Please enter your phone number."
    message: "Message*"
    message-validation: "Please enter a message."
    subject: "Gap Tap Contact Form Submission"
    submit: "Send Message"

  footer:
    legal: "Privacy Policy"
    social:
      - url: https://twitter.com
        icon: "fab fa-twitter"
      - url: https://facebook.com
        icon: "fab fa-facebook-f"
      - url: https://linkedin.com
        icon: "fab fa-linkedin-in"
      - url: https://github.com/raviriley/agency-jekyll-theme
        icon: "fab fa-github"
      - url: https://instagram.com
        icon: "fab fa-instagram"

en-US:
  <<: *DEFAULT_EN
en-CA:
  <<: *DEFAULT_EN
en-GB:
  <<: *DEFAULT_EN
en-AU:
  <<: *DEFAULT_EN
