# _data/ui-text.yml for Agency Jekyll Theme
#
# Sections now:
#   overview
#   specs
#   compare
#   how-to-use
#   buy
#
# Usage:
#   In your _config.yml, set `locale: "en"` (or en-US) to load this data.

en: &DEFAULT_EN

  # Header/Hero (Optional)
  header:
    title: "Welcome to Gap Tap!"
    text: "Flawless Floors. Seamless Repairs."
    button: "Discover More"
    buttonlink: "#overview"

  # OVERVIEW (Replacing "services")
  overview:
    title: "Overview"
    text: "Gap Tap quickly fixes gaps in laminate, vinyl, or wood floors. Built to save you time and money while ensuring professional results."
    section: overview
    list:
      - title: "Simple & Effective"
        desc: "Close gaps effortlessly with a heavy-duty suction cup and non-scratch mallet."
        icon: fas fa-hand-point-up
      - title: "For DIYers & Pros"
        desc: "Designed for homeowners and contractors who demand reliable tools."
        icon: fas fa-user-cog
      - title: "Built to Last"
        desc: "Premium materials ensure long-term durability and performance."
        icon: fas fa-check

  # SPECS (Replacing "portfolio")
  specs:
    title: "Specs"
    text: "Dive into the technical details that make Gap Tap so effective."
    section: specs
    closebutton: "Close"
    # Example bullet points or specs could go here
    bulletpoints:
      - "Weight: 3.2 lbs (approx. 1.45 kg)"
      - "Mallet included: Non-scratch head"
      - "Suction cup diameter: 4.5 inches"
      - "Materials: PA, steel, and shock-absorbing rubber"

  # COMPARE (Replacing "timeline")
  compare:
    title: "Compare"
    text: "See how Gap Tap stacks up against other floor repair methods."
    section: compare
    # Using timeline format to illustrate comparisons
    events:
      - title: "Traditional Block & Hammer"
        year: ""
        desc: "Risk of floor damage, no secure grip on floor pieces, plus a higher learning curve."
        image: assets/img/compare/block.jpg
        alt: "Block & hammer approach"
      - title: "Generic Suction Tools"
        year: ""
        desc: "Often weak suction and not built for repeated mallet strikes. Less durable."
        image: assets/img/compare/generic.jpg
        alt: "Generic suction comparison"
      - title: "Gap Tap Advantage"
        year: "Present"
        desc: "Strong suction, non-scratch mallet, premium materials. Designed specifically to fix floor gaps with ease."
        image: assets/img/compare/gap-tap.jpg
        alt: "Gap Tap advantage"
    end: "Choose a Better Way!"

  # HOW TO USE (Replacing "about")
  how-to-use:
    title: "How to Use"
    text: "A straightforward process to fix floor gaps."
    body: "1. Clean the gap area. <br> 2. Secure the suction cup. <br> 3. Tap gently with our non-scratch mallet until the gap closes. <br><br> For detailed instructions, refer to our included guide. **Markdown** is supported."
    section: how-to-use

  # BUY (Replacing "contact")
  buy:
    title: "Buy"
    text: "Ready to fix those floor gaps? Purchase Gap Tap from your favorite retailer."
    section: buy
    # Instead of a contact form, we’ll provide direct store links or info
    storelinks:
      - name: "Amazon"
        url: "https://www.amazon.com/dp/B0DJHFJ8PC"
        icon: fab fa-amazon
      - name: "Walmart"
        url: "https://www.walmart.com/ip/Gap-Tap-Heavy-Duty-Floor-Fixing-Tool/15297350480"
        icon: fas fa-store
      - name: "eBay"
        url: "https://www.ebay.com/itm/297015894001"
        icon: fab fa-ebay
    note: "For questions or bulk orders, email us at <strong>support@gap-tap.com</strong>."

  # FOOTER
  footer:
    legal: "Privacy Policy"
    social:
      - url: https://twitter.com
        icon: "fab fa-twitter"
      - url: https://facebook.com
        icon: "fab fa-facebook-f"
      - url: https://linkedin.com
        icon: "fab fa-linkedin-in"
      - url: https://github.com/raviriley/agency-jekyll-theme
        icon: "fab fa-github"
      - url: https://instagram.com
        icon: "fab fa-instagram"

# Additional English locales
en-US:
  <<: *DEFAULT_EN
en-CA:
  <<: *DEFAULT_EN
en-GB:
  <<: *DEFAULT_EN
en-AU:
  <<: *DEFAULT_EN
