# _data/navigation.yml
#
# This file configures the menu items for the Agency Jekyll theme in multiple languages.
# For each locale in your _config.yml (e.g. locale: "en"), the theme will display the nav items specified here.
#
# Usage in your theme:
#  {{ site.data.navigation[site.locale].nav | default: 'No navigation set' }}

en: &DEFAULT_EN
  nav:
    - title: "Overview"
      section: overview
    - title: "Specs"
      section: specs
    - title: "Compare"
      section: compare
    - title: "How to Use"
      section: how-to-use
    - title: "Buy"
      section: buy

en-US:
  <<: *DEFAULT_EN
en-CA:
  <<: *DEFAULT_EN
en-GB:
  <<: *DEFAULT_EN
en-AU:
  <<: *DEFAULT_EN

es: &DEFAULT_ES
  nav:
    - title: "Descripción"
      section: overview
    - title: "Especificaciones"
      section: specs
    - title: "Comparar"
      section: compare
    - title: "Cómo Usar"
      section: how-to-use
    - title: "Comprar"
      section: buy

es-ES:
  <<: *DEFAULT_ES
es-CO:
  <<: *DEFAULT_ES
