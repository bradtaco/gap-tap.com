#
# Work based on https://github.com/mmistakes/minimal-mistakes/blob/master/_data/ui-text.yml
#
# Configuration: Add to _config.yml
# locale: "en-US"  [YOUR PREFERRED LOCALE]
#
# How to use:
# {{ site.data.navigation[site.locale].nav.<var_name> | default: 'text' }}

# English (default)
# -----------------
en: &DEFAULT_EN
  nav:
    - title: "Overview"
      section: overview
    - title: "Specs"
      section: specs
    - title: "Compare"
      section: compare
    - title: "How to Use"
      section: how-to-use
    - title: "Buy"
      section: buy
      
en-US:
  <<: *DEFAULT_EN
en-CA:
  <<: *DEFAULT_EN
en-GB:
  <<: *DEFAULT_EN
en-AU:
  <<: *DEFAULT_EN

# Spanish
# -------
es: &DEFAULT_ES
  nav:
    - title: "Descripción"
      section: descripción
    - title: "Especificaciones"
      section: especificaciones
    - title: "Cómo Usar"
      section: cómo-usar
    - title: "Comparar"
      section: comparar
      
es-ES:
  <<: *DEFAULT_ES
es-CO:
  <<: *DEFAULT_ES
